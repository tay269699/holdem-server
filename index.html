<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>프라이빗 홀덤 프로</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 10px; background-color: #2c3e50; color: white; margin: 0; padding-bottom: 250px; } /* 챗창 공간 확보 */
    #login-screen, #lobby-screen, #game-room { display: none; }
    button { padding: 12px 20px; font-size: 15px; cursor: pointer; border-radius: 5px; border: none; margin: 5px; font-weight: bold; touch-action: manipulation; }
    input { padding: 12px; font-size: 16px; margin: 5px; width: 200px; border-radius: 5px; }
    .player-list { list-style: none; padding: 0; max-width: 300px; margin: 20px auto; }
    .player-list li { background-color: #34495e; margin: 5px; padding: 15px; border-radius: 5px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
    
    .timer-board { background-color: #e74c3c; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 16px; font-weight: bold; display: flex; justify-content: space-around; }
    .pot-area { background-color: #f1c40f; color: #333; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; }
    .card-container { display: flex; justify-content: center; gap: 5px; margin: 10px 0; min-height: 80px; }
    .card { background: white; color: black; padding: 15px 10px; border-radius: 5px; font-weight: bold; font-size: 20px; min-width: 35px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
    .red-card { color: #e74c3c; }
    .role-badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; margin-left: 5px; background: white; color: black;}
    
    .turn-highlight { box-shadow: 0 0 15px #2ecc71; border: 2px solid #2ecc71 !important; }
    .action-panel, .show-cards-panel { display: none; background-color: #34495e; padding: 15px; border-radius: 10px; margin-top: 15px; }
    .community-area { background-color: #16a085; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }

    .glossary-box { background-color: #16a085; padding: 15px; border-radius: 8px; margin-top: 30px; text-align: left; font-size: 13px; line-height: 1.6; max-width: 600px; margin-left: auto; margin-right: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
    .glossary-box h3 { margin-top: 0; color: #ecf0f1; font-size: 16px; border-bottom: 1px solid #1abc9c; padding-bottom: 5px; }
    .term { font-weight: bold; color: #f1c40f; display: inline-block; width: 110px; }
    .example { color: #ecf0f1; font-size: 12px; margin-left: 5px; }
    
    .raise-box { margin-top: 15px; border-top: 1px dashed #7f8c8d; padding-top: 15px; }
    .raise-input { width: 90px; text-align: center; font-weight: bold; font-size: 18px; padding: 10px; border: 2px solid #9b59b6; background-color: #fff; color: #333; margin-bottom: 10px; }
    
    .quick-raise-btn { background-color: #8e44ad; color: white; padding: 8px 12px; font-size: 14px; margin: 3px; border-radius: 5px; }
    .quick-raise-btn:active { background-color: #9b59b6; }

    .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: flex-end; z-index: 2000; padding-bottom: 30px; }
    .custom-modal { background: #2c3e50; border: 2px solid #f1c40f; border-radius: 10px; padding: 20px; width: 90%; max-width: 400px; color: white; font-weight: bold; font-size: 16px; text-align: left; white-space: pre-wrap; line-height: 1.5; box-shadow: 0px -5px 25px rgba(0,0,0,0.8); animation: slideUp 0.3s ease-out; max-height: 80vh; display: flex; flex-direction: column; }
    #custom-modal-text { overflow-y: auto; flex-grow: 1; }
    .custom-modal-btn { background: #f1c40f; color: #333; padding: 10px 20px; width: 100%; margin-top: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; border: none; flex-shrink: 0; }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* 신규 채팅창 CSS */
    .chat-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 220px; background: rgba(26, 37, 47, 0.95); border-top: 2px solid #34495e; display: none; flex-direction: column; z-index: 1000; }
    #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; margin: 0; list-style: none; text-align: left; font-size: 13px; color: #ecf0f1; }
    #chat-messages li { margin-bottom: 5px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; }
    .msg-sys { color: #f1c40f; font-weight: bold; }
    .msg-log { color: #2ecc71; }
    .chat-input-area { display: flex; padding: 5px 10px; background: #2c3e50; }
    .chat-input-area input { flex-grow: 1; margin: 0; padding: 8px; font-size: 14px; border-radius: 5px 0 0 5px; border: none; }
    .chat-input-area button { margin: 0; border-radius: 0 5px 5px 0; background: #3498db; color: white; padding: 8px 15px; font-size: 14px; }
    .kick-btn { background-color: #c0392b; color: white; font-size: 11px; padding: 5px 8px; margin: 0; cursor: pointer; border-radius: 3px; border: none; }
  </style>
</head>
<body>

  <div id="custom-modal-overlay" class="custom-modal-overlay">
    <div class="custom-modal">
      <div id="custom-modal-text"></div>
      <button class="custom-modal-btn" onclick="closeModal()">확인</button>
    </div>
  </div>

  <div id="login-screen" style="display: block;">
    <h1>프라이빗 홀덤</h1>
    <input type="text" id="room-code" placeholder="방 번호"><br>
    <input type="text" id="player-name" placeholder="닉네임"><br>
    <button onclick="joinRoom()" style="background-color: #3498db; color: white;">입장</button>
  </div>

  <div id="lobby-screen">
    <h2>대기실 (<span id="lobby-room-code"></span>)</h2>
    <ul class="player-list" id="lobby-players"></ul>
    <div id="host-controls" style="display: none;">
      <button onclick="addBot()" style="background-color: #8e44ad; color: white; margin-bottom: 10px;">🤖 봇(AI) 추가</button><br>
      <button onclick="startGame()" style="background-color: #e67e22; color: white;">🚀 게임 시작</button>
    </div>
    <div id="guest-waiting" style="display: none;"><p>방장이 시작할 때까지 대기 중...</p></div>
  </div>

  <div id="game-room">
    <div class="timer-board">
      <div>블라인드: <span id="current-blind">100/200</span></div>
      <div>⏳ <span id="blind-countdown">05:00</span></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <div id="host-game-controls" style="display: none;">
        <button onclick="endGame()" style="background-color: #c0392b; color: white; padding: 8px 12px; font-size: 13px;">🛑 종료 및 정산</button>
      </div>
      <div style="flex-grow: 1;"></div>
      <button onclick="requestRebuy()" style="background-color: #e74c3c; color: white; padding: 8px 12px; font-size: 13px;">💸 리바이</button>
    </div>

    <div class="pot-area" style="clear: both;">💰 총 팟(Pot): <span id="pot-amount">0</span> 칩</div>
    <p id="game-info" style="color: #2ecc71; font-weight: bold; font-size: 16px;"></p>

    <div id="host-next-game" style="display: none; margin-bottom: 20px;">
      <button onclick="startGame()" style="background-color: #e67e22; color: white; padding: 15px 30px; font-size: 18px;">👉 다음 판 딜링하기</button>
    </div>

    <div class="community-area">
      <p style="margin: 0; font-size: 16px; font-weight: bold; color: #ecf0f1;">테이블 바닥 카드</p>
      <div id="community-cards" class="card-container"></div>
    </div>

    <div id="player-status-board" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;"></div>

    <div id="my-area" style="background-color: #1a252f; padding: 15px; border-radius: 10px;">
      <p style="margin: 0; color: #bdc3c7;">내 카드</p>
      <div id="my-cards" class="card-container"></div>
      
      <div id="action-panel" class="action-panel">
        <h3 style="margin-top: 0; color: #f1c40f;">🚨 당신의 차례입니다!</h3>
        <button onclick="sendAction('fold')" style="background-color: #e74c3c; color: white;">폴드</button>
        <button id="btn-call" onclick="sendAction('call')" style="background-color: #3498db; color: white;">콜</button>
        
        <div class="raise-box">
          <div style="margin-bottom: 10px;">
            <button class="quick-raise-btn" onclick="quickRaise('half')">하프(Half)</button>
            <button class="quick-raise-btn" onclick="quickRaise('full')">풀(Full)</button>
            <button class="quick-raise-btn" onclick="quickRaise('allin')">올인(MAX)</button>
          </div>
          <div>
            <input type="number" id="raise-amount" class="raise-input" value="200" step="100">
            <button onclick="sendRaise()" style="background-color: #9b59b6; color: white; margin: 0;">레이즈 발사!</button>
          </div>
          <div style="width: 100%; color: #e74c3c; font-size: 12px; margin-top: 5px;">(최소 베팅 목표치: <span id="min-raise-display">200</span>칩 이상)</div>
        </div>
      </div>

      <div id="show-cards-panel" class="show-cards-panel">
        <p style="color: #bdc3c7; font-size: 14px;">상대방들은 내 카드를 모릅니다.</p>
        <button onclick="socket.emit('show_cards')" style="background-color: #9b59b6; color: white;">👉 내 카드 자랑하기 (선택)</button>
      </div>
    </div>

    <div class="glossary-box">
      <!-- 기존 족보 표 생략 (그대로 유지됩니다) -->
      <h3>📖 접속 종료(튕김) 안내</h3>
      <div style="font-size: 13px; color: #bdc3c7;">
        브라우저가 꺼지면 해당 판은 자동 폴드되지만 칩은 보존됩니다. 방 번호와 닉네임을 똑같이 입력하면 즉시 복구됩니다.
      </div>
    </div>
  </div>

  <!-- 신규 추가: 하단 고정 채팅 및 실시간 로그 창 -->
  <div id="chat-container" class="chat-container">
    <ul id="chat-messages"></ul>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode===13) sendChat()">
      <button onclick="sendChat()">전송</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myId = '';
    let isMyHost = false;
    
    // [신규] 효과음 설정 (브라우저 정책상 사용자 클릭 이후 재생 가능)
    const sounds = {
      deal: new Audio('https://actions.google.com/sounds/v1/water/air_release.ogg'), // 카드 깔리는 소리 (임시)
      bet: new Audio('https://actions.google.com/sounds/v1/foley/glass_clink.ogg'), // 칩 소리 (임시)
      raise: new Audio('https://actions.google.com/sounds/v1/foley/glass_clink.ogg'), // 레이즈 소리 (임시)
      check: new Audio('https://actions.google.com/sounds/v1/foley/foley_wood_tap.ogg'), // 톡톡 (체크)
      fold: new Audio('https://actions.google.com/sounds/v1/paper/paper_flap.ogg'), // 종이 넘기는 소리
      my_turn: new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg') // 띠링!
    };
    // 볼륨 조절
    Object.values(sounds).forEach(audio => audio.volume = 0.5);

    function playSound(type) {
      if(sounds[type]) {
        sounds[type].currentTime = 0;
        sounds[type].play().catch(e => console.log("사운드 재생 대기 (클릭 후 활성화됨)"));
      }
    }

    socket.on('play_sound', (type) => { playSound(type); });

    let currentMinRaise = 200; 
    let blindInterval;
    let uiCurrentPot = 0;
    let uiCurrentHighestBet = 0;
    let uiMyChips = 0;
    let uiMyCurrentBet = 0;

    function showCustomAlert(msg) {
      document.getElementById('custom-modal-text').innerText = msg;
      document.getElementById('custom-modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('custom-modal-overlay').style.display = 'none'; }

    // 인터랙션 감지 (사운드 권한 확보용)
    document.body.addEventListener('click', () => { window.userInteracted = true; }, { once: true });

    function joinRoom() {
      const roomCode = document.getElementById('room-code').value;
      const name = document.getElementById('player-name').value;
      if(!roomCode || !name) return alert("방 번호와 닉네임을 입력하세요.");
      socket.emit('join_room', { roomCode: roomCode, playerName: name }); 
    }

    socket.on('join_error', (msg) => { alert(msg); window.location.reload(); });
    
    // [신규] 강퇴 당했을 때
    socket.on('kicked_out', () => { 
      alert("방장에 의해 강퇴되었습니다."); 
      window.location.reload(); 
    });

    function addBot() { socket.emit('add_bot'); }
    function kickPlayer(id) { if(confirm("이 플레이어를 강퇴하시겠습니까?")) socket.emit('kick_player', id); }

    function startGame() { socket.emit('start_game'); }
    function requestRebuy() { socket.emit('rebuy'); showCustomAlert("💸 충전 완료.\n진행 중인 판이 끝나면 적용됩니다."); }
    function endGame() { if(confirm("게임을 종료하고 최종 정산을 진행하시겠습니까?")) socket.emit('end_game'); }

    // [신규] 채팅 전송
    function sendChat() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if(msg) {
        socket.emit('send_chat', msg);
        input.value = '';
      }
    }

    // [신규] 채팅 수신
    socket.on('chat_message', (data) => {
      const ul = document.getElementById('chat-messages');
      const li = document.createElement('li');
      if(data.type === 'sys') li.innerHTML = `<span class="msg-sys">${data.msg}</span>`;
      else if(data.type === 'log') li.innerHTML = `<span class="msg-log">${data.msg}</span>`;
      else li.innerHTML = `<strong>${data.name}:</strong> ${data.msg}`;
      
      ul.appendChild(li);
      ul.scrollTop = ul.scrollHeight; // 스크롤 맨 아래로
    });

    function sendAction(actionType, amount = 0) {
      socket.emit('player_action', { action: actionType, amount: amount });
      document.getElementById('action-panel').style.display = 'none';
    }

    function sendRaise() {
      const raiseAmt = parseInt(document.getElementById('raise-amount').value);
      if (isNaN(raiseAmt) || raiseAmt < currentMinRaise) {
        if(raiseAmt !== (uiMyChips + uiMyCurrentBet)) { 
          return showCustomAlert(`⚠️ 룰 위반\n최소 ${currentMinRaise}칩 이상으로 레이즈해야 합니다!`);
        }
      }
      sendAction('raise', raiseAmt);
    }

    function quickRaise(type) {
      let amountToCall = uiCurrentHighestBet - uiMyCurrentBet;
      let potAfterCall = uiCurrentPot + amountToCall;
      let raiseTotal = 0;
      if (type === 'half') raiseTotal = uiCurrentHighestBet + Math.floor(potAfterCall / 2);
      else if (type === 'full') raiseTotal = uiCurrentHighestBet + potAfterCall;
      else if (type === 'allin') raiseTotal = uiMyChips + uiMyCurrentBet;

      if (raiseTotal < currentMinRaise && type !== 'allin') raiseTotal = currentMinRaise; 
      if (raiseTotal > uiMyChips + uiMyCurrentBet) raiseTotal = uiMyChips + uiMyCurrentBet; 
      document.getElementById('raise-amount').value = raiseTotal;
    }

    socket.on('system_message', (msg) => { showCustomAlert(msg); });

    socket.on('update_lobby', (players) => {
      myId = socket.id; 
      document.getElementById('lobby-room-code').innerText = document.getElementById('room-code').value;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('lobby-screen').style.display = 'block';
      document.getElementById('game-room').style.display = 'none';
      document.getElementById('chat-container').style.display = 'flex'; // 채팅창 표시

      const ul = document.getElementById('lobby-players');
      ul.innerHTML = '';
      let myInfo = players.find(p => p.id === myId);
      isMyHost = (myInfo && myInfo.isHost);

      players.forEach(p => {
        const crown = p.isHost ? '👑' : '';
        const offlineMark = p.isOffline ? ' <span style="color:#e74c3c; font-size:12px;">(오프라인)</span>' : '';
        // [신규] 방장인 경우 타인에게 강퇴 버튼 표시
        const kickBtn = (isMyHost && p.id !== myId) ? `<button class="kick-btn" onclick="kickPlayer('${p.id}')">강퇴</button>` : '';
        
        ul.innerHTML += `<li><div>${crown} ${p.name}${offlineMark}</div><div>${kickBtn}</div></li>`;
      });

      if (isMyHost) {
        document.getElementById('host-controls').style.display = 'block';
        document.getElementById('guest-waiting').style.display = 'none';
      } else {
        document.getElementById('host-controls').style.display = 'none';
        document.getElementById('guest-waiting').style.display = 'block';
      }
    });

    socket.on('game_started', (gameData) => {
      myId = socket.id; 
      document.getElementById('lobby-screen').style.display = 'none';
      document.getElementById('game-room').style.display = 'block';
      updateGameStateUI(gameData);
    });

    socket.on('update_game_state', (gameData) => {
      myId = socket.id; 
      updateGameStateUI(gameData);
    });

    function updateBlindTimer(level, endTime, blinds) {
      clearInterval(blindInterval);
      const curr = blinds[level] || blinds[blinds.length - 1];
      const next = blinds[Math.min(level + 1, blinds.length - 1)];
      document.getElementById('current-blind').innerText = `${curr.sb} / ${curr.bb}`;
      
      blindInterval = setInterval(() => {
        const diff = endTime - Date.now();
        if (diff <= 0) {
          document.getElementById('blind-countdown').innerText = `(다음 판 ${next.sb}/${next.bb})`;
          clearInterval(blindInterval);
        } else {
          const m = Math.floor(diff / 60000).toString().padStart(2, '0');
          const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
          document.getElementById('blind-countdown').innerText = `${m}:${s}`;
        }
      }, 1000);
    }

    function updateGameStateUI(gameData) {
      if(gameData.blindEndTime) updateBlindTimer(gameData.blindLevel, gameData.blindEndTime, gameData.blinds);

      const myInfo = gameData.players[myId];
      if (myInfo && myInfo.isHost) document.getElementById('host-game-controls').style.display = 'block';
      else document.getElementById('host-game-controls').style.display = 'none';
      
      uiCurrentPot = gameData.pot; uiCurrentHighestBet = gameData.highestBet;
      uiMyChips = myInfo ? myInfo.chips : 0; uiMyCurrentBet = myInfo ? myInfo.currentBet : 0;

      document.getElementById('pot-amount').innerText = gameData.pot.toLocaleString();
      currentMinRaise = gameData.minRaise;
      document.getElementById('min-raise-display').innerText = currentMinRaise;
      
      const raiseInput = document.getElementById('raise-amount');
      raiseInput.min = currentMinRaise; 
      if (parseInt(raiseInput.value) < currentMinRaise) raiseInput.value = currentMinRaise; 

      const container = document.getElementById('my-cards');
      container.innerHTML = ''; 
      if (myInfo && myInfo.cards) { 
        myInfo.cards.forEach(c => {
          const colorClass = (c.suit === '♥' || c.suit === '♦') ? 'red-card' : '';
          container.innerHTML += `<div class="card ${colorClass}">${c.suit}${c.rank}</div>`;
        });
      }

      const commContainer = document.getElementById('community-cards');
      commContainer.innerHTML = '';
      gameData.communityCards.forEach(c => {
        const colorClass = (c.suit === '♥' || c.suit === '♦') ? 'red-card' : '';
        commContainer.innerHTML += `<div class="card ${colorClass}">${c.suit}${c.rank}</div>`;
      });

      const board = document.getElementById('player-status-board');
      board.innerHTML = '';
      let turnPlayerName = '';

      Object.values(gameData.players).forEach(p => {
        const role = p.role ? `<span class="role-badge">${p.role}</span>` : '';
        const isTurn = p.id === gameData.currentTurnId;
        
        let stateMark = '';
        if (p.isOffline) stateMark = '🔌(오프라인)';
        else if (p.state === 'folded') stateMark = '❌(폴드)';
        else if (p.chips === 0 && p.state === 'playing') stateMark = '🔥(올인)';
        else if (p.state === 'waiting') stateMark = '⏳(대기)';
        else if (p.state === 'busted') stateMark = '💀(파산)';
        else if (p.acted) stateMark = '✔️(완료)';

        if(isTurn) turnPlayerName = p.name;
        const turnClass = isTurn ? 'turn-highlight' : '';
        const opacity = p.isOffline ? '0.3' : (p.state === 'busted' || p.state === 'waiting') ? '0.5' : '1';

        board.innerHTML += `
          <div style="background: #2c3e50; padding: 10px; border-radius: 8px; border: 2px solid transparent; width: 100px; opacity: ${opacity};" class="${turnClass}">
            <div style="font-weight: bold; font-size: 14px;">${p.name} ${role}</div>
            <div style="font-size: 13px; margin: 5px 0;">칩: ${p.chips}</div>
            <div style="color: #f39c12; font-size: 12px; margin-top: 5px;">베팅: ${p.currentBet} <br>${stateMark}</div>
          </div>
        `;
      });

      document.getElementById('action-panel').style.display = 'none';
      document.getElementById('show-cards-panel').style.display = 'none';

      if (gameData.stage === 5) {
        document.getElementById('game-info').innerText = "🏁 이번 판 종료! 방장이 다음 판을 시작할 때까지 대기하세요.";
        if (myInfo && myInfo.isHost) document.getElementById('host-next-game').style.display = 'block'; 
        else document.getElementById('host-next-game').style.display = 'none';
        if (gameData.uncontestedWinner === myId) document.getElementById('show-cards-panel').style.display = 'block';
      } 
      else {
        document.getElementById('host-next-game').style.display = 'none';
        
        if (myInfo && (myInfo.state === 'waiting' || myInfo.state === 'busted' || myInfo.isOffline)) {
           document.getElementById('game-info').innerText = "👀 관전 중: 방장이 [다음 판 딜링하기]를 누르면 자동으로 합류합니다!";
        }
        else if (gameData.currentTurnId === myId) {
          document.getElementById('game-info').innerText = `내 차례입니다!`;
          const amountToCall = gameData.highestBet - myInfo.currentBet;
          const btnCall = document.getElementById('btn-call');
          
          if (amountToCall === 0) {
            btnCall.innerText = "체크 (Check)"; btnCall.style.backgroundColor = "#2ecc71"; 
          } else {
            let actualCall = Math.min(amountToCall, myInfo.chips);
            btnCall.innerText = `콜 (${actualCall})${actualCall===myInfo.chips ? ' 올인!' : ''}`;
            btnCall.style.backgroundColor = "#3498db"; 
          }
          document.getElementById('action-panel').style.display = 'block'; 
        } else {
          document.getElementById('game-info').innerText = turnPlayerName ? `👉 [${turnPlayerName}] 님의 턴...` : '결과 판정 중...';
        }
      }
    }
  </script>
</body>
</html>
